slug: iso27001
name: "ISO/IEC 27001:2022 Annex A"
version: "ISO/IEC 27001:2022"
description: >
  Information security controls from Annex A of ISO/IEC 27001:2022. The standard
  contains 93 controls organised into four themes: Organisational (5.x), People (6.x),
  Physical (7.x), and Technological (8.x).

controls:
  # ── Theme 5: Organisational ───────────────────────────────────────────────
  - ref: "5.1"
    domain: "Organisational"
    title: "Policies for information security"
    description: >
      Information security policy and topic-specific policies shall be defined,
      approved by management, published, communicated to and acknowledged by
      relevant personnel and relevant interested parties, and reviewed at planned
      intervals or if significant changes occur.

  - ref: "5.2"
    domain: "Organisational"
    title: "Information security roles and responsibilities"
    description: >
      Information security roles and responsibilities shall be defined and
      allocated according to the organisation needs.

  - ref: "5.3"
    domain: "Organisational"
    title: "Segregation of duties"
    description: >
      Conflicting duties and conflicting areas of responsibility shall be
      segregated.

  - ref: "5.4"
    domain: "Organisational"
    title: "Management responsibilities"
    description: >
      Management shall require all personnel to apply information security in
      accordance with the established information security policy, topic-specific
      policies and procedures of the organisation.

  - ref: "5.5"
    domain: "Organisational"
    title: "Contact with authorities"
    description: >
      The organisation shall establish and maintain contact with relevant
      authorities.

  - ref: "5.6"
    domain: "Organisational"
    title: "Contact with special interest groups"
    description: >
      The organisation shall establish and maintain contact with special interest
      groups or other specialist security forums and professional associations.

  - ref: "5.7"
    domain: "Organisational"
    title: "Threat intelligence"
    description: >
      Information relating to information security threats shall be collected and
      analysed to produce threat intelligence.

  - ref: "5.8"
    domain: "Organisational"
    title: "Information security in project management"
    description: >
      Information security shall be integrated into project management.

  - ref: "5.9"
    domain: "Organisational"
    title: "Inventory of information and other associated assets"
    description: >
      An inventory of information and other associated assets, including owners,
      shall be developed and maintained.

  - ref: "5.10"
    domain: "Organisational"
    title: "Acceptable use of information and other associated assets"
    description: >
      Rules for the acceptable use and procedures for handling information and
      other associated assets shall be identified, documented and implemented.

  - ref: "5.11"
    domain: "Organisational"
    title: "Return of assets"
    description: >
      Personnel and other interested parties as appropriate shall return all the
      organisation's assets in their possession upon change or termination of
      their employment, contract or agreement.

  - ref: "5.12"
    domain: "Organisational"
    title: "Classification of information"
    description: >
      Information shall be classified according to the information security needs
      of the organisation based on confidentiality, integrity, availability and
      relevant interested party requirements.

  - ref: "5.13"
    domain: "Organisational"
    title: "Labelling of information"
    description: >
      An appropriate set of procedures for information labelling shall be
      developed and implemented in accordance with the information classification
      scheme adopted by the organisation.

  - ref: "5.14"
    domain: "Organisational"
    title: "Information transfer"
    description: >
      Information transfer rules, procedures, or agreements shall be in place for
      all types of transfer facilities within the organisation and between the
      organisation and other parties.

  - ref: "5.15"
    domain: "Organisational"
    title: "Access control"
    description: >
      Rules to control physical and logical access to information and other
      associated assets shall be established and implemented based on business
      and information security requirements.

  - ref: "5.16"
    domain: "Organisational"
    title: "Identity management"
    description: >
      The full life cycle of identities shall be managed.

  - ref: "5.17"
    domain: "Organisational"
    title: "Authentication information"
    description: >
      Allocation and management of authentication information shall be controlled
      by a management process, including advising personnel on appropriate
      handling of authentication information.

  - ref: "5.18"
    domain: "Organisational"
    title: "Access rights"
    description: >
      Access rights to information and other associated assets shall be
      provisioned, reviewed, modified and removed in accordance with the
      organisation's topic-specific policy on and rules for access control.

  - ref: "5.19"
    domain: "Organisational"
    title: "Information security in supplier relationships"
    description: >
      Processes and procedures shall be defined and implemented to manage the
      information security risks associated with the use of supplier's products
      or services.

  - ref: "5.20"
    domain: "Organisational"
    title: "Addressing information security within supplier agreements"
    description: >
      Relevant information security requirements shall be established and agreed
      with each supplier based on the type of supplier relationship.

  - ref: "5.21"
    domain: "Organisational"
    title: "Managing information security in the ICT supply chain"
    description: >
      Processes and procedures shall be defined and implemented to manage the
      information security risks associated with the ICT products and services
      supply chain.

  - ref: "5.22"
    domain: "Organisational"
    title: "Monitoring, review and change management of supplier services"
    description: >
      The organisation shall regularly monitor, review, evaluate and manage
      change in supplier information security practices and service delivery.

  - ref: "5.23"
    domain: "Organisational"
    title: "Information security for use of cloud services"
    description: >
      Processes for acquisition, use, management and exit from cloud services
      shall be established in accordance with the organisation's information
      security requirements.

  - ref: "5.24"
    domain: "Organisational"
    title: "Information security incident management planning and preparation"
    description: >
      The organisation shall plan and prepare for managing information security
      incidents by defining, establishing and communicating information security
      incident management processes, roles and responsibilities.

  - ref: "5.25"
    domain: "Organisational"
    title: "Assessment and decision on information security events"
    description: >
      The organisation shall assess information security events and decide if
      they are to be categorised as information security incidents.

  - ref: "5.26"
    domain: "Organisational"
    title: "Response to information security incidents"
    description: >
      Information security incidents shall be responded to in accordance with
      the documented procedures.

  - ref: "5.27"
    domain: "Organisational"
    title: "Learning from information security incidents"
    description: >
      Knowledge gained from information security incidents shall be used to
      strengthen and improve the information security controls.

  - ref: "5.28"
    domain: "Organisational"
    title: "Collection of evidence"
    description: >
      The organisation shall establish and implement procedures for the
      identification, collection, acquisition and preservation of evidence
      related to information security events.

  - ref: "5.29"
    domain: "Organisational"
    title: "Information security during disruption"
    description: >
      The organisation shall plan how to maintain information security at an
      appropriate level during disruption.

  - ref: "5.30"
    domain: "Organisational"
    title: "ICT readiness for business continuity"
    description: >
      ICT readiness shall be planned, implemented, maintained and tested based
      on business continuity objectives and ICT continuity requirements.

  - ref: "5.31"
    domain: "Organisational"
    title: "Legal, statutory, regulatory and contractual requirements"
    description: >
      Legal, statutory, regulatory and contractual requirements relevant to
      information security and the organisation's approach to meet these
      requirements shall be identified, documented and kept up to date.

  - ref: "5.32"
    domain: "Organisational"
    title: "Intellectual property rights"
    description: >
      The organisation shall implement appropriate procedures to protect
      intellectual property rights.

  - ref: "5.33"
    domain: "Organisational"
    title: "Protection of records"
    description: >
      Records shall be protected from loss, destruction, falsification,
      unauthorised access and unauthorised release.

  - ref: "5.34"
    domain: "Organisational"
    title: "Privacy and protection of personal information"
    description: >
      The organisation shall identify and meet the requirements regarding the
      preservation of privacy and protection of personal information according
      to applicable laws and regulations and contractual requirements.

  - ref: "5.35"
    domain: "Organisational"
    title: "Independent review of information security"
    description: >
      The organisation's approach to managing information security and its
      implementation including people, processes and technologies shall be
      reviewed independently at planned intervals, or when significant changes
      occur.

  - ref: "5.36"
    domain: "Organisational"
    title: "Compliance with policies, rules and standards for information security"
    description: >
      Compliance with the organisation's information security policy,
      topic-specific policies, rules and standards shall be regularly reviewed.

  - ref: "5.37"
    domain: "Organisational"
    title: "Documented operating procedures"
    description: >
      Operating procedures for information processing facilities shall be
      documented and made available to personnel who need them.

  # ── Theme 6: People ───────────────────────────────────────────────────────
  - ref: "6.1"
    domain: "People"
    title: "Screening"
    description: >
      Background verification checks on all candidates to become personnel shall
      be carried out prior to joining the organisation and on an ongoing basis,
      taking into consideration applicable laws, regulations and ethics and be
      proportional to the business requirements, the classification of the
      information to be accessed and the perceived risks.

  - ref: "6.2"
    domain: "People"
    title: "Terms and conditions of employment"
    description: >
      The employment contractual agreements shall state the personnel's and the
      organisation's responsibilities for information security.

  - ref: "6.3"
    domain: "People"
    title: "Information security awareness, education and training"
    description: >
      Personnel of the organisation and relevant interested parties shall receive
      appropriate information security awareness, education and training and
      regular updates of the organisation's information security policy,
      topic-specific policies and procedures, as relevant for their job function.

  - ref: "6.4"
    domain: "People"
    title: "Disciplinary process"
    description: >
      A disciplinary process shall be formalised and communicated to take actions
      against personnel and other relevant interested parties who have committed
      an information security policy violation.

  - ref: "6.5"
    domain: "People"
    title: "Responsibilities after termination or change of employment"
    description: >
      Information security responsibilities and duties that remain valid after
      termination or change of employment shall be defined, enforced and
      communicated to relevant personnel and other interested parties.

  - ref: "6.6"
    domain: "People"
    title: "Confidentiality or non-disclosure agreements"
    description: >
      Confidentiality or non-disclosure agreements reflecting the organisation's
      needs for the protection of information shall be identified, documented,
      regularly reviewed and signed by personnel and other relevant interested
      parties.

  - ref: "6.7"
    domain: "People"
    title: "Remote working"
    description: >
      Security measures shall be implemented when personnel are working remotely
      to protect information accessed, processed or stored outside the
      organisation's premises.

  - ref: "6.8"
    domain: "People"
    title: "Information security event reporting"
    description: >
      The organisation shall provide a mechanism for personnel to report observed
      or suspected information security events through appropriate channels in a
      timely manner.

  # ── Theme 7: Physical ─────────────────────────────────────────────────────
  - ref: "7.1"
    domain: "Physical"
    title: "Physical security perimeters"
    description: >
      Security perimeters shall be defined and used to protect areas that contain
      information and other associated assets.

  - ref: "7.2"
    domain: "Physical"
    title: "Physical entry"
    description: >
      Secure areas shall be protected by appropriate entry controls and access
      points.

  - ref: "7.3"
    domain: "Physical"
    title: "Securing offices, rooms and facilities"
    description: >
      Physical security for offices, rooms and facilities shall be designed and
      implemented.

  - ref: "7.4"
    domain: "Physical"
    title: "Physical security monitoring"
    description: >
      Premises shall be continuously monitored for unauthorised physical access.

  - ref: "7.5"
    domain: "Physical"
    title: "Protecting against physical and environmental threats"
    description: >
      Protection against physical and environmental threats, such as natural
      disasters and other intentional or unintentional physical threats to
      infrastructure shall be designed and implemented.

  - ref: "7.6"
    domain: "Physical"
    title: "Working in secure areas"
    description: >
      Security measures for working in secure areas shall be designed and
      implemented.

  - ref: "7.7"
    domain: "Physical"
    title: "Clear desk and clear screen"
    description: >
      Clear desk rules for papers and removable storage media and clear screen
      rules for information processing facilities shall be defined and
      appropriately enforced.

  - ref: "7.8"
    domain: "Physical"
    title: "Equipment siting and protection"
    description: >
      Equipment shall be sited securely and protected.

  - ref: "7.9"
    domain: "Physical"
    title: "Security of assets off-premises"
    description: >
      Off-site assets shall be protected.

  - ref: "7.10"
    domain: "Physical"
    title: "Storage media"
    description: >
      Storage media shall be managed through their life cycle of acquisition,
      use, transportation and disposal in accordance with the organisation's
      classification scheme and handling requirements.

  - ref: "7.11"
    domain: "Physical"
    title: "Supporting utilities"
    description: >
      Information processing facilities shall be protected from power failures
      and other disruptions caused by failures in supporting utilities.

  - ref: "7.12"
    domain: "Physical"
    title: "Cabling security"
    description: >
      Cables carrying power, data or supporting information services shall be
      protected from interception, interference or damage.

  - ref: "7.13"
    domain: "Physical"
    title: "Equipment maintenance"
    description: >
      Equipment shall be maintained correctly to ensure availability, integrity
      and confidentiality of information.

  - ref: "7.14"
    domain: "Physical"
    title: "Secure disposal or re-use of equipment"
    description: >
      Items of equipment containing storage media shall be verified to ensure
      that any sensitive data and licensed software has been removed or securely
      overwritten prior to disposal or re-use.

  # ── Theme 8: Technological ────────────────────────────────────────────────
  - ref: "8.1"
    domain: "Technological"
    title: "User endpoint devices"
    description: >
      Information stored on, processed by or accessible via user endpoint devices
      shall be protected.

  - ref: "8.2"
    domain: "Technological"
    title: "Privileged access rights"
    description: >
      The allocation and use of privileged access rights shall be restricted and
      managed.

  - ref: "8.3"
    domain: "Technological"
    title: "Information access restriction"
    description: >
      Access to information and other associated assets shall be restricted in
      accordance with the established topic-specific policy on access control.

  - ref: "8.4"
    domain: "Technological"
    title: "Access to source code"
    description: >
      Read and write access to source code, development tools and software
      libraries shall be appropriately managed.

  - ref: "8.5"
    domain: "Technological"
    title: "Secure authentication"
    description: >
      Secure authentication technologies and procedures shall be implemented
      based on information access restrictions and the topic-specific policy on
      access control.

  - ref: "8.6"
    domain: "Technological"
    title: "Capacity management"
    description: >
      The use of resources shall be monitored and adjusted in line with current
      and expected capacity requirements.

  - ref: "8.7"
    domain: "Technological"
    title: "Protection against malware"
    description: >
      Protection against malware shall be implemented and supported by
      appropriate user awareness.

  - ref: "8.8"
    domain: "Technological"
    title: "Management of technical vulnerabilities"
    description: >
      Information about technical vulnerabilities of information systems in use
      shall be obtained in a timely fashion, the organisation's exposure to such
      vulnerabilities shall be evaluated and appropriate measures shall be taken.

  - ref: "8.9"
    domain: "Technological"
    title: "Configuration management"
    description: >
      Configurations, including security configurations, of hardware, software,
      services and networks shall be established, documented, implemented,
      monitored and reviewed.

  - ref: "8.10"
    domain: "Technological"
    title: "Information deletion"
    description: >
      Information stored in information systems, devices or in any other storage
      media shall be deleted when no longer required.

  - ref: "8.11"
    domain: "Technological"
    title: "Data masking"
    description: >
      Data masking shall be used in accordance with the organisation's
      topic-specific policy on access control and other related topic-specific
      policies, and business requirements, taking applicable legislation into
      consideration.

  - ref: "8.12"
    domain: "Technological"
    title: "Data leakage prevention"
    description: >
      Data leakage prevention measures shall be applied to systems, networks and
      any other devices that process, store or transmit sensitive information.

  - ref: "8.13"
    domain: "Technological"
    title: "Information backup"
    description: >
      Backup copies of information, software and systems shall be maintained and
      regularly tested in accordance with the agreed topic-specific policy on
      backup.

  - ref: "8.14"
    domain: "Technological"
    title: "Redundancy of information processing facilities"
    description: >
      Information processing facilities shall be implemented with redundancy
      sufficient to meet availability requirements.

  - ref: "8.15"
    domain: "Technological"
    title: "Logging"
    description: >
      Logs that record activities, exceptions, faults and other relevant events
      shall be produced, stored, protected and analysed.

  - ref: "8.16"
    domain: "Technological"
    title: "Monitoring activities"
    description: >
      Networks, systems and applications shall be monitored for anomalous
      behaviour and appropriate actions taken to evaluate potential information
      security incidents.

  - ref: "8.17"
    domain: "Technological"
    title: "Clock synchronisation"
    description: >
      The clocks of information processing systems used by the organisation shall
      be synchronised to approved time sources.

  - ref: "8.18"
    domain: "Technological"
    title: "Use of privileged utility programs"
    description: >
      The use of utility programs that might be capable of overriding system and
      application controls shall be restricted and tightly controlled.

  - ref: "8.19"
    domain: "Technological"
    title: "Installation of software on operational systems"
    description: >
      Procedures and measures shall be implemented to securely manage software
      installation on operational systems.

  - ref: "8.20"
    domain: "Technological"
    title: "Networks security"
    description: >
      Networks and network devices shall be secured, managed and controlled to
      protect information in systems and applications.

  - ref: "8.21"
    domain: "Technological"
    title: "Security of network services"
    description: >
      Security mechanisms, service levels and service requirements of network
      services shall be identified, implemented and monitored.

  - ref: "8.22"
    domain: "Technological"
    title: "Segregation of networks"
    description: >
      Groups of information services, users and information systems shall be
      segregated in the organisation's networks.

  - ref: "8.23"
    domain: "Technological"
    title: "Web filtering"
    description: >
      Access to external websites shall be managed to reduce exposure to
      malicious content.

  - ref: "8.24"
    domain: "Technological"
    title: "Use of cryptography"
    description: >
      Rules for the effective use of cryptography, including cryptographic key
      management, shall be defined and implemented.

  - ref: "8.25"
    domain: "Technological"
    title: "Secure development life cycle"
    description: >
      Rules for the secure development of software and systems shall be
      established and applied.

  - ref: "8.26"
    domain: "Technological"
    title: "Application security requirements"
    description: >
      Information security requirements shall be identified, specified and
      approved when developing or acquiring applications.

  - ref: "8.27"
    domain: "Technological"
    title: "Secure system architecture and engineering principles"
    description: >
      Principles for engineering secure systems shall be established, documented,
      maintained and applied to any information system development or integration
      activities.

  - ref: "8.28"
    domain: "Technological"
    title: "Secure coding"
    description: >
      Secure coding principles shall be applied to software development.

  - ref: "8.29"
    domain: "Technological"
    title: "Security testing in development and acceptance"
    description: >
      Security testing processes shall be defined and implemented in the
      development life cycle.

  - ref: "8.30"
    domain: "Technological"
    title: "Outsourced development"
    description: >
      The organisation shall direct, monitor and review the activities related
      to outsourced system development.

  - ref: "8.31"
    domain: "Technological"
    title: "Separation of development, test and production environments"
    description: >
      Development, testing and production environments shall be separated and
      secured.

  - ref: "8.32"
    domain: "Technological"
    title: "Change management"
    description: >
      Changes to information processing facilities and information systems shall
      be subject to change management procedures.

  - ref: "8.33"
    domain: "Technological"
    title: "Test information"
    description: >
      Test information shall be appropriately selected, protected and managed.

  - ref: "8.34"
    domain: "Technological"
    title: "Protection of information systems during audit testing"
    description: >
      Audit tests and other assurance activities involving assessment of
      operational systems shall be planned and agreed between the tester and
      appropriate management.
