name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lighthouse_test
          POSTGRES_USER: lighthouse
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          # TEST_DATABASE_URL tells conftest.py to use Postgres (not SQLite fallback)
          TEST_DATABASE_URL: postgresql+asyncpg://lighthouse:testpassword@localhost:5432/lighthouse_test
          SECRET_KEY: test-secret-key
        run: pytest -v

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        # Using npm install until package-lock.json is committed (run `npm install`
        # locally in the frontend/ directory, commit the lock file, then switch back to npm ci)
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build
